<!DOCTYPE html>
<html lang="fr">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BioTrack</title>

        <!-- Leaflet CSS -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>

    <!-- LEFT COLUMN: header + sidebar + footer -->
    <aside id="sidebar">
        <header>
            <span class="logo">BioTrack</span>
            <button id="btn-dark" title="Mode sombre">🌙</button>
        </header>

        <div class="sidebar-content">
            <div class="sidebar-year">
                <label for="year-select">Année</label>
                <select id="year-select">
                    <option value="2012">2012</option>
                    <option value="2013">2013</option>
                    <option value="2014">2014</option>
                    <option value="2015">2015</option>
                    <option value="2016">2016</option>
                    <option value="2017">2017</option>
                    <option value="2018">2018</option>
                    <option value="2019" selected>2019</option>
                </select>
            </div>
            <div class="accordion">
                <div class="accordion-header" id="acc-search-header">
                    <span>Recherche</span>
                    <span class="acc-arrow">›</span>
                </div>
                <div class="accordion-body" id="acc-search-body">
                    <div class="sidebar-search">
                        <input type="text" id="shark-search" placeholder="Rechercher un requin…" />
                    </div>
                </div>
            </div>

            <div class="accordion">
                <div class="accordion-header" id="acc-filter-header">
                    <span>Filtres</span>
                    <span class="acc-arrow">›</span>
                </div>
                <div class="accordion-body" id="acc-filter-body">
                    <div class="sidebar-filter">
                        <div class="filter-row">
                            <label>Poids (kg)</label>
                            <div class="filter-inputs">
                                <input type="number" id="filter-weight-min" placeholder="min" />
                                <input type="number" id="filter-weight-max" placeholder="max" />
                            </div>
                        </div>
                        <div class="filter-row">
                            <label>Taille (cm)</label>
                            <div class="filter-inputs">
                                <input type="number" id="filter-length-min" placeholder="min" />
                                <input type="number" id="filter-length-max" placeholder="max" />
                            </div>
                        </div>
                        <div class="filter-actions">
                            <button id="btn-filter-reset" title="Réinitialiser">✕</button>
                            <button id="btn-filter" title="Appliquer">✓</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-header">
                <input type="checkbox" id="cb-global" checked />
                <label for="cb-global">Requins</label>
            </div>
            <ul id="shark-list"></ul>
        </div>

        <footer>
            <p class="footer-copy">
                <a href="https://github.com/titarm-tech/biotrack" target="_blank" rel="noopener">GitHub : titarm-tech/biotrack</a>
            </p>
        </footer>
    </aside>

    <!-- RIGHT COLUMN: map -->
    <div id="map-wrapper">
        <div id="map-placeholder">La carte Leaflet s'affichera ici</div>
        <div id="map" style="display:none;"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>
    <script src="script.js"></script>

    </body>

</html>
